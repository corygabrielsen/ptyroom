# Pre-commit hooks configuration
# See https://pre-commit.com for more information
#
# Install hooks: pre-commit install
# Run manually:  pre-commit run --all-files
# Skip hooks:    git commit --no-verify

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      # No `no-commit-to-branch` here: this repo doesn't gate on PRs.
      # Add the hook with a typed-branch regex if/when a PR workflow
      # is adopted.
      - id: check-added-large-files
      - id: check-case-conflict
      - id: check-executables-have-shebangs
      - id: check-merge-conflict
      - id: check-yaml
      - id: detect-private-key
      - id: end-of-file-fixer
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: trailing-whitespace

  # Local hooks: Rust workspace lints. Mirror `make lint` exactly so a
  # green pre-commit and a green CI agree by construction.
  # Tools required (one-time install):
  #   cargo install cargo-sort cargo-machete
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt --check
        entry: cargo fmt --all -- --check
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-clippy
        name: cargo clippy
        entry: cargo clippy --workspace --all-targets -- -D warnings
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-sort
        name: cargo sort --check
        entry: cargo sort --workspace --check
        language: system
        files: ^(.*/)?Cargo\.toml$
        pass_filenames: false

      - id: cargo-machete
        name: cargo machete
        entry: cargo machete
        language: system
        files: ^(.*/)?Cargo\.toml$
        pass_filenames: false
