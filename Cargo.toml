[package]
name = "tint-recorder"
version = "0.1.0"
edition = "2024"
license = "MIT"
description = "Deterministic GIF recorder for tint demos."

[lib]
name = "tint_recorder"
path = "src/lib.rs"

# Pipeline binaries auto-discovered from src/bin/*.rs.
# Scene binaries live under scenes/ for clarity.

[[bin]]
name = "smoke"
path = "scenes/smoke.rs"

[[bin]]
name = "demo_full"
path = "scenes/demo_full.rs"

[dependencies]
anyhow = "1"
clap = { version = "4", features = ["derive", "env"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
regex = "1"
image = { version = "0.25", default-features = false, features = ["png"] }
ab_glyph = "0.2"
nix = { version = "0.31", features = ["fs", "ioctl", "poll", "process", "signal", "term"] }
tempfile = "3"

[dev-dependencies]
serde_json = "1"

[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 1
strip = "symbols"
