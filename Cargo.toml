[workspace]
members = ["tint-scenes"]

[package]
name = "term-recorder"
version = "0.1.0"
edition = "2024"
rust-version = "1.95"
license = "MIT"
description = "Deterministic terminal session recorder with virtual time and verifiable artifacts. Spawns any interactive process under a PTY and emits asciinema casts, painted PNG frames, and encoded GIF/MP4."
repository = "https://github.com/corygabrielsen/tint-recorder"
readme = "README.md"
keywords = ["terminal", "pty", "asciinema", "recording", "cli"]
categories = ["command-line-utilities", "development-tools"]

[lints.clippy]
pedantic = { level = "deny", priority = -1 }

[lib]
name = "term_recorder"
path = "src/lib.rs"

# Generic pipeline binaries:
# - encode, paint, stitch, compare_snapshots, inspect — auto-discovered
#   from src/bin/<name>.rs.
# - stress-child — explicit because the test integration uses the
#   hyphenated form via env!("CARGO_BIN_EXE_stress-child").
# Tint-coupled scene + verify + pipeline-test + recorder_perf binaries
# live in the sibling `tint-recorder-scenes` crate.

[[bin]]
name = "stress-child"
path = "src/bin/stress_child.rs"

[dependencies]
anyhow = "1"
clap = { version = "4", features = ["derive", "env"] }
rayon = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
regex = "1"
image = { version = "0.25", default-features = false, features = ["png"] }
ab_glyph = "0.2"
nix = { version = "0.31", features = ["fs", "ioctl", "poll", "process", "signal", "term"] }
tempfile = "3"
sha2 = "0.10"

[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 1
strip = "symbols"
