
[package]
name = "term-recorder"
version = "0.1.0"
edition = "2024"
rust-version = "1.95"
license = "MIT"
description = "Deterministic terminal session recorder with virtual time and verifiable artifacts. Spawns any interactive process under a PTY and emits asciinema casts, painted PNG frames, and encoded GIF/MP4."
repository = "https://github.com/corygabrielsen/term-recorder"
readme = "README.md"
keywords = ["terminal", "pty", "asciinema", "recording", "cli"]
categories = ["command-line-utilities", "development-tools"]
[workspace]
members = ["tint-scenes"]

[lib]
name = "term_recorder"
path = "src/lib.rs"

# Generic pipeline binaries:
# - encode, paint, snapshot, stitch, compare_snapshots, inspect —
#   auto-discovered from src/bin/<name>.rs.
# - stress-child — explicit because the test integration uses the
#   hyphenated form via env!("CARGO_BIN_EXE_stress-child").
# Consumer-coupled scene + verify + pipeline-test + recorder_perf
# binaries live in the sibling `tint-scenes` crate.

[[bin]]
name = "stress-child"
path = "src/bin/stress_child.rs"

[dependencies]
ab_glyph = "0.2"
anyhow = "1"
clap = { version = "4", features = ["derive"] }
image = { version = "0.25", default-features = false, features = ["png"] }
nix = { version = "0.31", features = ["poll"] }
portable-pty = "0.9.0"
rayon = "1"
regex = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.11.0"
tempfile = "3"
vt100 = "0.16.2"

[lints.clippy]
pedantic = { level = "deny", priority = -1 }

[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 1
strip = "symbols"
