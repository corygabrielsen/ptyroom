[package]
name = "tint-recorder"
version = "0.1.0"
edition = "2024"
rust-version = "1.95"
license = "MIT"
description = "Deterministic terminal recorder with virtual time and verifiable CLI demo artifacts."
repository = "https://github.com/corygabrielsen/tint-recorder"
readme = "README.md"
keywords = ["terminal", "pty", "asciinema", "recording", "cli"]
categories = ["command-line-utilities", "development-tools"]

[lints.clippy]
pedantic = { level = "deny", priority = -1 }

[lib]
name = "tint_recorder"
path = "src/lib.rs"

# Pipeline binaries auto-discovered from src/bin/*.rs.
# Scene binaries live under scenes/ for clarity.

[[bin]]
name = "smoke"
path = "scenes/smoke.rs"

[[bin]]
name = "demo_full"
path = "scenes/demo_full.rs"

[[bin]]
name = "picker"
path = "scenes/picker.rs"

[[bin]]
name = "picker_timeline"
path = "scenes/picker_timeline.rs"

[[bin]]
name = "cli"
path = "scenes/cli.rs"

[[bin]]
name = "cd_hook"
path = "scenes/cd_hook.rs"

[[bin]]
name = "custom_theme"
path = "scenes/custom_theme.rs"

[[bin]]
name = "bench_tiny"
path = "scenes/bench_tiny.rs"

[[bin]]
name = "bench_churn"
path = "scenes/bench_churn.rs"

[[bin]]
name = "bench_subloops"
path = "scenes/bench_subloops.rs"

[[bin]]
name = "stitch"
path = "src/bin/stitch.rs"

[[bin]]
name = "recorder_perf"
path = "src/bin/recorder_perf.rs"

[[bin]]
name = "compare_snapshots"
path = "src/bin/compare_snapshots.rs"

# Pipeline test driver: characterize / bless / verify / render
# subcommands. Replaces the bash scripts that previously orchestrated
# the full record→snapshot→paint→encode→verify pipeline.
[[bin]]
name = "pipeline-test"
path = "src/bin/pipeline_test.rs"

# Synthetic child for the recorder stress tests
# (tests/recorder_stress.rs). Emits pattern + trailing in one print!,
# which is one write syscall, which exposes the wait_for cutoff
# contract under deterministic conditions.
[[bin]]
name = "stress-child"
path = "src/bin/stress_child.rs"

[dependencies]
anyhow = "1"
clap = { version = "4", features = ["derive", "env"] }
rayon = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
regex = "1"
image = { version = "0.25", default-features = false, features = ["png"] }
ab_glyph = "0.2"
nix = { version = "0.31", features = ["fs", "ioctl", "poll", "process", "signal", "term"] }
tempfile = "3"
sha2 = "0.10"

[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 1
strip = "symbols"
